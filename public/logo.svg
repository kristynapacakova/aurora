<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" fill="none">
  <defs>
    <!-- Hlavní gradient loga: růžová → oranžová → zlatá -->
    <linearGradient id="aGrad" x1="80" y1="10" x2="240" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5BAA8"/>
      <stop offset="55%"  stop-color="#F4A36C"/>
      <stop offset="100%" stop-color="#F6C45D"/>
    </linearGradient>
    <!-- Gradient pro Aurora text -->
    <linearGradient id="textGrad" x1="20" y1="170" x2="280" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F09880"/>
      <stop offset="60%"  stop-color="#F4A36C"/>
      <stop offset="100%" stop-color="#F6C45D"/>
    </linearGradient>
    <!-- Zlatý gradient pro slunce -->
    <radialGradient id="sunGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%"   stop-color="#F6D97A"/>
      <stop offset="100%" stop-color="#F4A36C"/>
    </radialGradient>
    <!-- Světlo na A (highlight) -->
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ═══ Písmeno A — stuha s gradientem ═══ -->
  <!-- Levá noha A: zakřivená stuha doleva -->
  <path
    d="M 160 18
       C 148 30, 110 80, 72 155
       C 65 170, 60 178, 58 185
       L 80 185
       C 82 178, 86 170, 94 155
       C 130 82, 166 34, 178 20
       Z"
    fill="url(#aGrad)"
  />
  <!-- Pravá noha A: zakřivená stuha doprava a dolů -->
  <path
    d="M 160 18
       C 172 30, 200 70, 228 120
       C 248 155, 258 175, 262 188
       L 240 188
       C 236 175, 226 156, 207 122
       C 180 72, 152 34, 142 20
       Z"
    fill="url(#aGrad)"
  />
  <!-- Spodní zakroucení pravé nohy (ocas) -->
  <path
    d="M 240 188
       C 248 196, 255 200, 258 195
       C 262 190, 256 183, 246 180
       L 238 180
       Z"
    fill="#F4A36C"
  />
  <!-- Highlight (světelný lesk na levé noze) -->
  <path
    d="M 165 22
       C 156 36, 120 86, 82 158
       L 88 160
       C 126 88, 162 38, 170 24
       Z"
    fill="white"
    opacity="0.35"
  />

  <!-- ═══ Sluníčko ═══ -->
  <g transform="translate(160, 148)">
    <!-- Paprsky -->
    <g stroke="#F6C45D" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-16" x2="0"    y2="-22"/>
      <line x1="11"  y1="-11" x2="15"  y2="-16" transform="rotate(30)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(45)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(90)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(135)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(-45)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(-90)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(-135)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(22.5)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(67.5)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(112.5)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(-22.5)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(-67.5)"/>
      <line x1="0"   y1="-16" x2="0"   y2="-22" transform="rotate(-112.5)"/>
    </g>
    <!-- Půlkruh slunce (vycházející) -->
    <path d="M -9 2 A 9 9 0 0 1 9 2 Z" fill="url(#sunGrad)"/>
    <!-- Odraz -->
    <ellipse cx="0" cy="4" rx="6" ry="2" fill="#F6C45D" opacity="0.25"/>
  </g>

  <!-- ═══ Aurora — Allura script ═══ -->
  <text
    x="160" y="222"
    text-anchor="middle"
    font-family="'Allura', cursive"
    font-size="72"
    fill="url(#textGrad)"
  >Aurora</text>

  <!-- ═══ yoga — rozestoupené verzálky ═══ -->
  <text
    x="160" y="255"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="16"
    letter-spacing="8"
    fill="#F4A36C"
  >yoga</text>
</svg>
